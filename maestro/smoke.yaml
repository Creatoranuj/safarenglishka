# Maestro smoke flow — runs on Android emulator in CI.
# Install Maestro: curl -fsSL https://get.maestro.mobile.dev | bash
# Run locally:    maestro test maestro/smoke.yaml --env MAESTRO_EMAIL=... --env MAESTRO_PASSWORD=...
# In CI:          set MAESTRO_EMAIL / MAESTRO_PASSWORD as repo secrets and pass with --env.
# NEVER hardcode credentials here — this file is committed to the repo.
appId: com.safarenglishka.app
---
# 1) Cold start → landing
# NOTE: WebView cold start on API 28 (Android 9's older Chromium) takes
# noticeably longer than API 33/35 — the app + JS bundle can need 20–30s to
# first-paint on the emulator. Keep this timeout generous so the flow is not
# API-level-flaky. Regex accepts either the landing brand OR the Login CTA
# (whichever renders first proves the WebView is alive).
- launchApp:
    clearState: true
# Step 1 — WebView cold-start proof. API 28 (older Chromium) can take 60-80s
# to first paint on x86_64 emulator; keep this generous. Widened regex covers
# landing brand ("Safar English"), header nav ("Login"), hero CTAs, and the
# Login screen headline so whichever paints first counts as pass.
- extendedWaitUntil:
    visible: "Safar English|Login|Welcome|Get Started|Sign In|Continue"
    timeout: 90000

# 2) Landing → Login screen
- extendedWaitUntil:
    visible: "Login"
    timeout: 20000
- tapOn:
    text: "Login"
    index: 0
- extendedWaitUntil:
    visible: "Welcome Back"
    timeout: 20000

# 3) Auth flow — real Supabase login on signed release build.
# NOTE: `waitForAnimationToEnd` was removed here — on Android WebView it
# sometimes returns a null screenshot before the surface is ready, which
# aborted the whole flow on API 33 with `Screenshot returned null`. The
# `extendedWaitUntil` above already gates on real content, so animation
# settling is implicit. Screenshot still captured for failure triage.
- takeScreenshot: before-login-assertion
- tapOn:
    id: ".*(email|Email).*"
    optional: true
- tapOn:
    text: "Email"
    optional: true
- inputText: ${MAESTRO_EMAIL}
- tapOn:
    id: ".*(password|Password).*"
    optional: true
- tapOn:
    text: "Password"
    optional: true
- inputText: ${MAESTRO_PASSWORD}

- tapOn: "Sign In"
# Post-login dashboard render. Tokens verified against src/pages/Dashboard.tsx
# (Quick Actions header, All Classes tile, No active courses empty state,
# Continue where you left copy). Bumped to 90s — API 35 cold-load of the
# authenticated route hit gRPC 120s DEADLINE_EXCEEDED on 30s budget.
- extendedWaitUntil:
    visible: "Quick Actions|All Classes|No active courses|Continue where you left|Dashboard"
    timeout: 90000


# 4) My Courses tab — bottom nav renders, route mounts
- tapOn:
    text: "My Courses"
    optional: true
- extendedWaitUntil:
    visible: "My Courses|No active courses|Enrolled"
    timeout: 15000

# 5) Downloads tab — empty state OR list renders (proves route + IndexedDB init)
- tapOn:
    text: "Downloads"
    optional: true
- extendedWaitUntil:
    visible: "Downloads|No downloads|Saved"
    timeout: 15000


# 6) Profile tab — session persists across nav (email visible = session alive)
- tapOn:
    text: "Profile"
    optional: true
- extendedWaitUntil:
    visible: ${MAESTRO_EMAIL}
    timeout: 10000

# 7) Settings → Delete Account visible (Play Store policy guardrail)
- tapOn:
    text: "Settings"
    optional: true
- extendedWaitUntil:
    visible: "Delete Account|Delete my account"
    timeout: 8000
    optional: true

# 8) Hardware back → exit hint (regression fix from useAndroidBackButton)
- pressKey: Back
- pressKey: Back
- extendedWaitUntil:
    visible: "Press back again to exit"
    timeout: 4000
    optional: true
- pressKey: Back
