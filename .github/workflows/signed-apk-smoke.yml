name: Signed APK Smoke

# Runs Maestro smoke flow against the SIGNED release APK on tag pushes.
# This catches ProGuard/R8 stripping regressions that debug builds miss.
# Debug-APK Maestro run lives in maestro-android.yml (nightly/manual).
#
# Required GitHub secrets:
#   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD,
#   MAESTRO_EMAIL, MAESTRO_PASSWORD,
#   VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY, VITE_SUPABASE_ANON_KEY

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: signed-apk-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-signed-apk:
    # macOS: HVF-accelerated emulator boots in ~3-5 min vs 15+ on Ubuntu.
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.18'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install deps
        run: bun install --frozen-lockfile --ignore-scripts

      - name: 🏗️ Build web assets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: bun run build

      - name: 🔁 Cap sync
        run: bunx cap sync android

      - name: 🔐 Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret missing — cannot build signed release APK"; exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "✅ Keystore decoded ($(wc -c < android/app/release.keystore) bytes)"

      - name: 🏗️ Build signed release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: 📥 Install Maestro
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: 🤖 Boot emulator + install SIGNED APK + smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: |
            APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
            echo "Installing signed APK: $APK"
            adb install -r "$APK"
            export MAESTRO_EMAIL='${{ secrets.MAESTRO_EMAIL }}'
            export MAESTRO_PASSWORD='${{ secrets.MAESTRO_PASSWORD }}'
            # Smoke only — full suite in maestro-android.yml. If smoke fails
            # on a signed release build, ProGuard likely stripped something.
            maestro test maestro/smoke.yaml --format junit --output signed-smoke.xml

      - name: 🧹 Cleanup keystore
        if: always()
        run: rm -f android/app/release.keystore

      - name: 📤 Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk-smoke-report
          path: |
            signed-smoke.xml
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore
