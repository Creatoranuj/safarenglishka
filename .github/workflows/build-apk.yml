# Signed Release APK — Safar English
#
# Trigger: push a semver tag (`git tag v1.2.3 && git push --tags`) or manual dispatch.
# Output: GitHub Release with `SafarEnglish-v<version>.apk` + static `SafarEnglish.apk`.
#
# Required repo secrets (Settings → Secrets → Actions):
#   ANDROID_KEYSTORE_BASE64       # base64 -w0 release.keystore
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#
# Notes on shell / actions pinning (ci-e2e-error-monitor skill):
#   - Every `run:` starts with `set -e` (POSIX-safe). Never `set -o pipefail` — dash aborts. (S1/S10)
#   - Artifact actions pinned to node24 majors: upload-artifact@v6. (S2)
#   - Numeric-only versionName guard prevents android/app/build.gradle strip-to-empty bug.

name: Build Signed APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver (e.g. 1.2.3). Leave blank to default to 1.0.0.'
        required: false
        default: ''

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # needed by softprops/action-gh-release

jobs:
  build:
    name: Build & release signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node (from .nvmrc)
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Derive APP_VERSION_NAME (numeric guard)
        id: version
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "push" ]; then
            RAW="${GITHUB_REF_NAME#v}"
          else
            RAW="${{ github.event.inputs.version }}"
            [ -z "$RAW" ] && RAW="1.0.0"
          fi
          if ! echo "$RAW" | grep -Eq '^[0-9]+(\.[0-9]+){0,2}$'; then
            echo "::error::APP_VERSION_NAME '$RAW' is not numeric semver (e.g. 1.2.3). Aborting to avoid android/app/build.gradle strip-to-empty bug."
            exit 1
          fi
          echo "APP_VERSION_NAME=$RAW" >> "$GITHUB_ENV"
          echo "version=$RAW" >> "$GITHUB_OUTPUT"
          echo "🔖 APP_VERSION_NAME=$RAW"

      - name: Install dependencies (Bun)
        run: |
          set -e
          bun install --frozen-lockfile

      - name: Build web assets
        run: |
          set -e
          bun run build

      - name: Sync Capacitor (dist → android)
        run: |
          set -e
          npx cap sync android

      - name: Decode release keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -e
          if [ -z "${KS_B64:-}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          echo "$KS_B64" | base64 -d > android/app/release.keystore
          echo "✓ keystore written ($(stat -c%s android/app/release.keystore) bytes)"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Signed Release APK
        env:
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          if [ -z "${KS_PASSWORD:-}" ] || [ -z "${KEY_ALIAS:-}" ] || [ -z "${KEY_PASSWORD:-}" ]; then
            echo "::error::Missing one of ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD."
            exit 1
          fi
          cd android
          ./gradlew assembleRelease \
            --no-daemon --parallel --build-cache \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KS_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: APK smoke check (MainActivity + capacitor.plugins.json)
        run: |
          set -e
          PLUGINS_JSON="android/app/src/main/assets/capacitor.plugins.json"
          if [ ! -f "$PLUGINS_JSON" ]; then
            echo "::error::capacitor.plugins.json missing — cap sync did not run."
            exit 1
          fi
          if ! grep -q "MainActivity" android/app/src/main/AndroidManifest.xml; then
            echo "::error::MainActivity missing from AndroidManifest.xml."
            exit 1
          fi
          PLUGIN_COUNT=$(grep -c '"pkg"' "$PLUGINS_JSON" || echo 0)
          echo "✓ MainActivity present, $PLUGIN_COUNT Capacitor plugins bundled."

      - name: Rename APK for release
        id: rename
        run: |
          set -e
          SRC="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SRC" ]; then
            echo "::error::Release APK not found at $SRC"
            exit 1
          fi
          mkdir -p release-artifacts
          VERSIONED="release-artifacts/SafarEnglish-v${APP_VERSION_NAME}.apk"
          STATIC="release-artifacts/SafarEnglish.apk"
          cp "$SRC" "$VERSIONED"
          cp "$SRC" "$STATIC"
          SIZE=$(du -sh "$VERSIONED" | cut -f1)
          SHA=$(sha256sum "$VERSIONED" | cut -d' ' -f1)
          echo "✓ $VERSIONED ($SIZE)"
          echo "  sha256: $SHA"
          echo "versioned=$VERSIONED" >> "$GITHUB_OUTPUT"
          echo "static=$STATIC" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: SafarEnglish-v${{ env.APP_VERSION_NAME }}
          path: release-artifacts/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: android-build-logs-v${{ env.APP_VERSION_NAME }}
          path: |
            android/app/build/outputs/logs/
            android/build/reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Safar English ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/SafarEnglish-v${{ env.APP_VERSION_NAME }}.apk
            release-artifacts/SafarEnglish.apk
          body: |
            **Signed Release APK**

            - Versioned: `SafarEnglish-v${{ env.APP_VERSION_NAME }}.apk`
            - Static (always-latest): `SafarEnglish.apk`
            - SHA-256: `${{ steps.rename.outputs.sha256 }}`

            Install: `adb install -r SafarEnglish-v${{ env.APP_VERSION_NAME }}.apk`